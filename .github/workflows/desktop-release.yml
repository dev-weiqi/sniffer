name: Desktop Release

# Push a tag like v0.3.0 to build Sniffer.app and attach a dmg to a GitHub Release.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  dmg:
    runs-on: macos-14 # arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --prefix server/daemon
      - run: npm ci --prefix server/ui
      - run: npm ci --prefix desktop/electron
      # prepare-icon.mjs renders the icns from svg via rsvg-convert
      - run: brew install librsvg
      - run: npm run package:mac --prefix desktop/electron
      - name: Package x64
        working-directory: desktop/electron
        # prepare:daemon / prepare:icon already ran in package:mac; the daemon is pure JS so
        # cross-packaging the Intel build from the arm64 runner just pulls the x64 electron zip
        run: npx electron-packager . Sniffer --platform=darwin --arch=x64 --out=dist --overwrite --icon=build/icon/sniffer.icns --extra-resource=build/daemon
      - name: Build dmgs
        run: |
          for pair in arm64:aarch64 x64:x64; do
            src="${pair%%:*}" name="${pair##*:}"
            mkdir "dmg-$src"
            cp -R "desktop/electron/dist/Sniffer-darwin-$src/Sniffer.app" "dmg-$src/"
            ln -s /Applications "dmg-$src/Applications"
            hdiutil create -volname Sniffer -srcfolder "dmg-$src" -ov -format UDZO "Sniffer-server-mac-$name.dmg"
          done
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" Sniffer-server-mac-*.dmg --title "$GITHUB_REF_NAME" --generate-notes
